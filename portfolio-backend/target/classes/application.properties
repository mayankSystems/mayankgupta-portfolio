# ==========================================
# Mayank Gupta - Portfolio Backend Config
# ==========================================

spring.application.name=portfolio-backend
server.port=${PORT:8080}

# ── Email Configuration ─────────────────────────────────────────────────────
# Set these as environment variables in Railway / Render
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ce.mayank8@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password-here}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Portfolio Config ─────────────────────────────────────────────────────────
portfolio.email.to=${CONTACT_EMAIL:ce.mayank8@gmail.com}
portfolio.email.from=${FROM_EMAIL:noreply@mayank.dev}
portfolio.resume.path=classpath:static/resume.pdf

# ── CORS (add your Vercel URL here once deployed) ────────────────────────────
portfolio.cors.allowed-origins=http://localhost:5173,http://localhost:3000,${FRONTEND_URL:https://mayank-gupta.vercel.app}

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.dev.mayank=DEBUG
logging.level.org.springframework.mail=DEBUG
