# ==========================================
# Mayank Gupta - Portfolio Backend Config
# ==========================================

spring.application.name=portfolio-backend
server.port=${PORT:8080}

# -- CRITICAL: Do NOT test SMTP connection at startup ------------------------
# Without this, Spring Boot pings Gmail on boot - crashes if credentials
# are missing or Gmail is temporarily unreachable - healthcheck fails
spring.mail.test-connection=false

# -- Portfolio Config ---------------------------------------------------------
portfolio.email.to=ce.mayank8@gmail.com
portfolio.email.from=ce.mayank8@gmail.com
portfolio.resume.path=classpath:static/resume.pdf

# -- CORS ---------------------------------------------------------------------
portfolio.cors.allowed-origins=http://localhost:5173,http://localhost:3000,${FRONTEND_URL:https://mayank-gupta.vercel.app}

# -- Actuator (Railway healthcheck hits /api/health) --------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# -- Logging ------------------------------------------------------------------
logging.level.dev.mayank=INFO
logging.level.org.springframework.mail=DEBUG