# ==========================================
# Mayank Gupta - Portfolio Backend Config
# ==========================================

spring.application.name=portfolio-backend
server.port=${PORT:8080}

# -- Email Configuration -----------------------------------------------------
# All values come from Railway environment variables
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ce.mayank8@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# -- CRITICAL: Do NOT test SMTP connection at startup ------------------------
# Without this, Spring Boot pings Gmail on boot - crashes if credentials
# are missing or Gmail is temporarily unreachable - healthcheck fails
spring.mail.test-connection=false

# -- Portfolio Config ---------------------------------------------------------
portfolio.email.to=${CONTACT_EMAIL:ce.mayank8@gmail.com}
portfolio.email.from=${FROM_EMAIL:noreply@mayank.dev}
portfolio.resume.path=classpath:static/resume.pdf

# -- CORS ---------------------------------------------------------------------
portfolio.cors.allowed-origins=http://localhost:5173,http://localhost:3000,${FRONTEND_URL:https://mayank-gupta.vercel.app}

# -- Actuator (Railway healthcheck hits /api/health) --------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# -- Logging ------------------------------------------------------------------
logging.level.dev.mayank=INFO
logging.level.org.springframework.mail=DEBUG